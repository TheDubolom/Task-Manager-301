<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таск-Манагер-301</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
</head>

<body>
    <div class="main">
        <h1 class="header">
            Таск-Манагер-301
        </h1>
        <div class="input-area">
            <input id="input-task" placeholder="Новая штука"/>
            <button id="add-btn">Добавить штука</button>
        </div>

        
        <ul class="task-list">
            <li class="task-item low-priority" onclick="this.classList.toggle('completed')">
                <span class="task-content">Написать реферат</span>
                <div class="task-actions">
                    <button class="task-btn"><span class="material-symbols-outlined">stylus</span></button>
                    <button class="task-btn" onclick="this.parentNode.parentNode.remove()">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>
            </li>
            <li class="task-item high-priority" onclick="this.classList.toggle('completed')">
                <span class="task-content">Постирать носки</span>
                <div class="task-actions">
                    <button class="task-btn"><span class="material-symbols-outlined">stylus</span></button>
                    <button class="task-btn" onclick="this.parentNode.parentNode.remove()">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>
            </li>
            <li class="task-item medium-priority" onclick="this.classList.toggle('completed')">
                <span class="task-content">Написать Сергею с вопросом по протоколу</span>
                <div class="task-actions">
                    <button class="task-btn"><span class="material-symbols-outlined">stylus</span></button>
                    <button class="task-btn" onclick="this.parentNode.parentNode.remove()">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>
            </li>
        </ul>
    </div>
</body>

</html>
